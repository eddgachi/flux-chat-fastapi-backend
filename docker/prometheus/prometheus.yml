global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'chat-backend'

scrape_configs:
  - job_name: 'chat-backend'
    # 'app' matches the service name in docker-compose.yml
    static_configs:
      - targets: ['app:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
